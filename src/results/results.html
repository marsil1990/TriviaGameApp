<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trivia Game</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script type="module" src="../js/resultsPage.js"></script>
</head>

<body>
    <header id="header"></header>

    <main class="container">
        <section class="results-card">
            <h1>Game Results</h1>
            <p id="final-score"></p>
            <p id="final-percentage"></p>
            <p id="games-played"></p>
            <p id="average-percentage"></p>
            <p id="best-percentage"></p>

            <div class="results-actions">
                <a href="/index.html" class="btn">
                    Play Again
                </a>
                <a href="/index.html" class="btn" id="new-game">
                    Start New Game (Clear History)
                </a>

            </div>
        </section>
    </main>

    <footer id="footer"></footer>
</body>

</html>
